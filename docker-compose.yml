services:
  redis:
    image: redis:alpine
    container_name: earnguard-redis
    ports:
      - "6379:6379"
    networks:
      - earnguard-network

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: earnguard-server
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - DATABASE_URL=postgresql://postgres.qrycmzouihclgkpdspvt:Anudeep%401904@aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres
    depends_on:
      - redis
    networks:
      - earnguard-network

  simulation_server:
    build:
      context: ./simulation_servers
      dockerfile: Dockerfile
    container_name: sim-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres.vxtxxszjibmxkyqhejpm:deepu123mac@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres
    networks:
      - earnguard-network

  ml_service:
    build:
      context: ./ml_services
      dockerfile: Dockerfile
    container_name: ml-service
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=AIzaSyBjMm_vfLXEiQLVjF-YSEM3u5Udn6UC7go
    networks:
      - earnguard-network

networks:
  earnguard-network:
    driver: bridge
